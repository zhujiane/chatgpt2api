services:
  postgres:
    image: postgres:15-alpine
    container_name: chatgpt2api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatgpt2api}
      POSTGRES_USER: ${POSTGRES_USER:-chatgpt2api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatgpt2api_password}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api:local
    container_name: chatgpt2api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      - TZ=Asia/Shanghai
      # 存储后端配置 (可选值: json, sqlite, postgres, git)
      - STORAGE_BACKEND=postgres

      # 数据库配置 (当 STORAGE_BACKEND=sqlite/postgres 时使用)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chatgpt2api}:${POSTGRES_PASSWORD:-chatgpt2api_password}@postgres:5432/${POSTGRES_DB:-chatgpt2api}
      # - DATABASE_URL=sqlite:///app/data/accounts.db

      # Git 仓库配置 (当 STORAGE_BACKEND=git 时使用)
      # - GIT_REPO_URL=https://github.com/user/repo.git
      # - GIT_TOKEN=ghp_xxxxxxxxxxxx
      # - GIT_BRANCH=main
      # - GIT_FILE_PATH=accounts.json

      # 认证密钥 (可选，覆盖 config.json)
      # - CHATGPT2API_AUTH_KEY=your_secret_key

      # 基础 URL (可选)
      # - CHATGPT2API_BASE_URL=https://your-domain.com

volumes:
  postgres_data:
